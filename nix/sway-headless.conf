# Sway headless configuration for CI/headless GUI testing
output HEADLESS-1 {
    mode 1920x1080@60Hz
    pos 0 0
    bg #000000 solid_color
}

default_border none
titlebar_border_thickness 0
titlebar_padding 0

bar {
    mode invisible
}

focus_follows_mouse no

input "*" {
    repeat_delay 200
    repeat_rate 50
}

popup_during_fullscreen leave_fullscreen
